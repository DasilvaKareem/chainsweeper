name = "chainsweeper-room"
main = "worker/src/index.ts"
compatibility_date = "2025-01-01"

# Room DO: one instance per PvP matchId (6-char code) — dedicated single-
# writer actor for turn/player/board state.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# TerritoryIndex DO: singleton (name = 'global') that polls the SKALE chain
# for plot + marketplace events and fans snapshots/deltas out over WS. Shard
# by chunk coord when plot count outgrows one instance.
[[durable_objects.bindings]]
name = "TERRITORY"
class_name = "TerritoryIndex"

[[migrations]]
tag = "v1"
# SQLite-backed DO storage — required by Cloudflare's free plan. Legacy KV-
# backed storage is deprecated.
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TerritoryIndex"]

# ---- Territories chain env vars -------------------------------------------
# SKALE Base Sepolia (chain id 324705682). Public RPC — no gating. Override
# per-environment with `wrangler secret put SKALE_RPC_URL` if you run your
# own node. Contract addresses are empty placeholders until deployed.
[vars]
SKALE_RPC_URL = "https://base-sepolia-testnet.skalenodes.com/v1/jubilant-horrible-ancha"
# Deployed on SKALE Base Sepolia 2026-04-22.
PLOTS_ADDRESS = "0x675Fcd07f1a9441d96A7aE033CE23313eb363739"
MARKETPLACE_ADDRESS = "0x4Ea9181a151978e2c2aE8B6909aBb14d10228245"
# Deploy block of the Plots contract — DO starts log-scans here instead of
# block 0. (0x18da62 = 1628770.) Bump this if the contracts are redeployed.
FROM_BLOCK = "1628770"

[observability]
enabled = true
